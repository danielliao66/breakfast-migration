<ul>
  @for (item of orderedItems; track item.id) {
    <li class="list-item">
      <span>{{ item.name }}</span>
      <p>${{ (item.price/100).toFixed(2) }}</p>
      <button (click)="handleRemove($index)">-</button>
      <div>{{ item.quantity }}</div>
      <button (click)="handleAdd($index)">+</button>
    </li>
  }
  <li class="list-item summary">
    <span><strong>Total</strong></span>
    <p><strong>${{ (total/100).toFixed(2) }}</strong></p>
    <button (click)="handleCheckout()">checkout</button>
  </li>
  <input type="radio" id="dine-in" name="option" value="dine-in" (change)="handleOption()" [(ngModel)]="option">
  <label for="dine-in">dine-in</label>
  <input type="radio" id="take-out" name="option" value="take-out" (change)="handleOption()" [(ngModel)]="option">
  <label for="take-out">take-out</label>
</ul>
